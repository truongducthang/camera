mqtt:
  enabled: true
  host: mosquitto
  port: 1883
  topic_prefix: frigate
  client_id: frigate

# ============================================================================
# DETECTOR — AI engine để nhận diện object
# ============================================================================
detectors:
  cpu1:
    type: cpu
    num_threads: 3
  # edgetpu:                            # Bỏ comment nếu có Google Coral USB
  #   type: edgetpu
  #   device: usb

# ============================================================================
# FFMPEG — tham số chung cho mọi camera
# ============================================================================
ffmpeg:
  # TẠM TẮT hwaccel để chẩn đoán: NVDEC trên Pascal (GTX 1060) đang silent-fail
  # với HEVC từ Hikvision (PTS thất thường) → không có frame nào tới detect →
  # watchdog kill ffmpeg sau 20s → loop "Restarting ffmpeg".
  # hwaccel_args: preset-nvidia
  output_args:
    record: preset-record-generic-audio-copy

# ============================================================================
# DETECT — cấu hình mặc định cho detect engine
# ============================================================================
detect:
  enabled: true
  fps: 2                                # Giảm để watchdog không kill khi camera_fps thực tế thấp

objects:
  track:
    - person
    - car
    - dog
    - cat
  filters:
    person:
      min_score: 0.6
      threshold: 0.7

# ============================================================================
# RECORD — chính sách lưu video
# ============================================================================
record:
  enabled: true
  alerts:
    retain:
      days: 14
      mode: motion
  detections:
    retain:
      days: 7
      mode: motion

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 14

# ============================================================================
# go2rtc — RESTREAM SERVER giúp xem live MƯỢT qua WebRTC/MSE thay vì JSMPEG
# ============================================================================
# Luồng dữ liệu:
#   Cam ──RTSP──▶ go2rtc (port 8554) ──┬──▶ Frigate ffmpeg (record + detect)
#                                       └──▶ Browser (WebRTC/MSE, low-latency)
#
# Lợi ích:
#   - Cam chỉ phải phục vụ 1 connection (go2rtc), không bị quá tải.
#   - Browser xem qua WebRTC = latency 200-500ms (so với 3-5s của JSMPEG mặc định).
#   - Mọi consumer (Frigate, browser, HA, VLC...) đều xem chung 1 stream.
go2rtc:
  streams:
    front_door:
      - "{FRIGATE_CAM01_URL}"           # Sub-stream H.264 — cùng URL trong .env

  # WebRTC cần ICE candidates để browser biết kết nối tới đâu.
  # 127.0.0.1:8555 dùng khi mở Frigate UI từ chính máy đang chạy Docker.
  # Nếu mở UI từ máy/điện thoại khác trong LAN, thêm IP LAN của máy chạy Docker
  # vào danh sách, vd: 192.168.1.100:8555
  webrtc:
    candidates:
      - 127.0.0.1:8555
      - stun:8555

# ============================================================================
# CAMERAS
# ============================================================================
cameras:
  front_door:
    enabled: true

    ffmpeg:
      # Camera Hikvision này gửi RTSP với DTS không monotonic
      # (vd. "Non-monotonic DTS; previous: 1850602, current: 266432" — nhảy lùi 1.5M unit).
      # Trước đó hwaccel preset-nvidia nuốt lỗi silently → 0 frame → watchdog kill →
      # loop "Restarting ffmpeg". Khi tắt hwaccel mới lộ ra DTS hỏng là gốc rễ.
      #
      # `-use_wallclock_as_timestamps 1`: ffmpeg bỏ timestamp của camera, dùng giờ wallclock
      #   khi nhận packet → luôn monotonic, segment muxer ghi mp4 không lỗi.
      # `-fflags +genpts+discardcorrupt`: sinh PTS, vứt packet hỏng.
      # `-rtsp_transport tcp`: cam Hikvision hay drop UDP, TCP ổn định hơn.
      inputs:
        - path: "{FRIGATE_CAM01_URL}"
          input_args:
            - -avoid_negative_ts
            - make_zero
            - -fflags
            - +genpts+discardcorrupt
            - -use_wallclock_as_timestamps
            - "1"
            - -rtsp_transport
            - tcp
            - -timeout
            - "5000000"
          roles:
            - record
            - detect

    detect:
      width: 640                        # Giảm độ phân giải detect — pipe + CPU detector nhẹ hơn
      height: 360
      fps: 2

    # Frigate tự link UI live view với go2rtc stream cùng tên camera (`front_door`).
    # Không cần khai báo gì thêm.
    live:
      quality: 8                        # 1-31, càng thấp càng nét (cho fallback JSMPEG)

    # Zone — comment để test mọi vị trí trong khung hình.
    # Sau khi pipeline ổn, vẽ zone bằng UI (Settings → Mask & Zone Editor) rồi paste tọa độ vào đây.
    # zones:
    #   sidewalk:
    #     coordinates: "0,720,0,400,1280,400,1280,720"
    #     objects:
    #       - person

    review:
      alerts:
        labels:
          - person
        # required_zones:
        #   - sidewalk

# ============================================================================
# Mẹo xem live mượt nhất trong UI:
#   1. Mở http://localhost:5000/#front_door
#   2. Click icon ⚙ trên live view → "Camera Settings"
#   3. Streaming Mode → "Continuous Streaming"
#   4. Stream → chọn "MSE" (mặc định ổn) hoặc "WebRTC" (mượt nhất)
# ============================================================================